<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iowa Gambling Task · O Seu Psico</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">
        <a href="/" class="navbar__logo">
          <img src="assets/logo.png" alt="O Seu Psico" />
          <span class="navbar__logo-text">O Seu Psico<span></span></span>
          <span class="navbar__badge">IGT</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Barra de saldo e progresso -->
  <div class="igt-header">
    <div class="container">
      <div class="igt-header__inner">
        <div class="igt-balance">
          <span class="igt-balance__label">Saldo</span>
          <span class="igt-balance__value" id="saldo">R$ 2.000</span>
        </div>
        <div class="igt-trials">
          Tentativa <strong><span id="trial-count">0</span></strong> de <strong>100</strong>
        </div>
        <!-- Barra de progresso embutida -->
        <div style="flex:1;max-width:240px;">
          <div style="background:rgba(255,255,255,0.1);border-radius:var(--radius-full);height:6px;overflow:hidden;">
            <div id="progress-fill" style="height:100%;background:var(--yellow);border-radius:var(--radius-full);width:0%;transition:width 0.3s;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section class="igt-section">
    <div class="container" style="max-width:840px;">

      <div class="igt-instruction" id="instrucao">
        Escolha um baralho clicando sobre ele. Tente maximizar seu saldo ao longo das 100 tentativas.
      </div>

      <!-- Feedback -->
      <div class="igt-feedback">
        <div class="igt-feedback__msg" id="feedback-msg"></div>
      </div>

      <!-- Baralhos -->
      <div class="decks-grid">
        <button class="deck-card" data-deck="A" onclick="escolherBaralho('A')" id="deck-A">
          <div class="deck-card__count" id="deck-count-A">0</div>
          <div class="deck-card__letter">A</div>
          <div class="deck-card__label">Baralho A</div>
        </button>
        <button class="deck-card" data-deck="B" onclick="escolherBaralho('B')" id="deck-B">
          <div class="deck-card__count" id="deck-count-B">0</div>
          <div class="deck-card__letter">B</div>
          <div class="deck-card__label">Baralho B</div>
        </button>
        <button class="deck-card" data-deck="C" onclick="escolherBaralho('C')" id="deck-C">
          <div class="deck-card__count" id="deck-count-C">0</div>
          <div class="deck-card__letter">C</div>
          <div class="deck-card__label">Baralho C</div>
        </button>
        <button class="deck-card" data-deck="D" onclick="escolherBaralho('D')" id="deck-D">
          <div class="deck-card__count" id="deck-count-D">0</div>
          <div class="deck-card__letter">D</div>
          <div class="deck-card__label">Baralho D</div>
        </button>
      </div>

      <!-- Histórico -->
      <div class="igt-history">
        <div class="igt-history__title">Últimas escolhas</div>
        <div class="igt-history__list" id="history-list"></div>
      </div>

    </div>
  </section>

  <script src="js/igt.js"></script>
  <script>
    // Garante que o usuário veio do formulário
    (function() {
      if (!sessionStorage.getItem('psico_igt_cadastro')) {
        window.location.href = '/formulario.html';
      }
    })();

    // Integra barra de progresso com a lógica do igt.js
    const _origAtualizarUI = window.atualizarUI;
    function atualizarUIComProgresso() {
      const fill = document.getElementById('progress-fill');
      if (fill) fill.style.width = (state.tentativa / 100 * 100) + '%';

      // Desabilita baralhos durante o bloqueio
      ['A','B','C','D'].forEach(d => {
        const btn = document.getElementById('deck-' + d);
        if (btn) btn.disabled = state.bloqueado;
      });
    }

    // Patch: após cada escolha, atualiza progresso também
    const _orig = window.escolherBaralho;
    window.escolherBaralho = function(deck) {
      _orig(deck);
      setTimeout(atualizarUIComProgresso, 50);
    };
  </script>
</body>
</html>
